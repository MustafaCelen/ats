services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hireflow
      POSTGRES_USER: hireflow
      POSTGRES_PASSWORD: hireflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireflow -d hireflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://hireflow:hireflow_password@postgres:5432/hireflow
      SESSION_SECRET: local-dev-session-secret-change-in-production
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WA_TEMPLATE_SID: ${TWILIO_WA_TEMPLATE_SID:-HXca9e3716cf8c73bca2dbc77937e3ec72}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5000}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
