services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hireflow
      POSTGRES_USER: hireflow
      POSTGRES_PASSWORD: hireflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireflow -d hireflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://hireflow:hireflow_password@postgres:5432/hireflow
      SESSION_SECRET: local-dev-session-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
